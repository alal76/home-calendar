# Copy these keys into your existing /config/esphome/secrets.yaml on Home Assistant.
# Do NOT commit your real secrets.yaml to git.

wifi_ssid: "YourNetworkName"
wifi_password: "YourWifiPassword"

# Generated once per device — keep your existing key from the current esp32connector
# config. Find it in HA at Settings → Devices & Services → ESPHome → esp32connector
# → 3-dot menu → "Encryption key".
api_encryption_key: "base64-encoded-32-byte-key-here"

# OTA password set when the device was first flashed. Required so the next
# OTA install can authenticate against the firmware currently running on the
# device. After your first successful re-flash with this yaml, this password
# stays in effect for subsequent OTAs.
ota_password: "hex-string-or-passphrase-here"
