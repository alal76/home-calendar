<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1500" height="1130" fill="#f7f7f5"/>

  <text x="40" y="52" font-size="30" font-weight="700" fill="#111">ESP32-S3 full-pin routing for Waveshare 9-wire harness</text>
  <text x="40" y="80" font-size="15" fill="#555">All board pins are shown. Only the 9 display wires are routed and color-coded.</text>

  <!-- Waveshare side -->
  <g>
    <rect x="60" y="130" width="360" height="600" rx="12" fill="#1f5f3a" stroke="#0d3f20" stroke-width="2"/>
    <text x="240" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#e9f7ec">Waveshare HAT (B)</text>
    <text x="240" y="194" text-anchor="middle" font-size="14" fill="#c8e8d0">9-pin connector (top to bottom)</text>

    <g font-size="17" font-weight="700" fill="#fff">
      <text x="96" y="270">PWR</text>
      <text x="96" y="322">BUSY</text>
      <text x="96" y="374">RST</text>
      <text x="96" y="426">DC</text>
      <text x="96" y="478">CS</text>
      <text x="96" y="530">CLK</text>
      <text x="96" y="582">DIN</text>
      <text x="96" y="634">GND</text>
      <text x="96" y="686">VCC</text>
    </g>

    <g>
      <circle cx="332" cy="266" r="8" fill="#8b4513"/>
      <circle cx="332" cy="318" r="8" fill="#ffffff" stroke="#333"/>
      <circle cx="332" cy="370" r="8" fill="#8e44ad"/>
      <circle cx="332" cy="422" r="8" fill="#27ae60"/>
      <circle cx="332" cy="474" r="8" fill="#e67e22"/>
      <circle cx="332" cy="526" r="8" fill="#e0c50a"/>
      <circle cx="332" cy="578" r="8" fill="#1e6fd9"/>
      <circle cx="332" cy="630" r="8" fill="#111"/>
      <circle cx="332" cy="682" r="8" fill="#d62828"/>
    </g>

    <g font-size="15" font-weight="700" fill="#f3f6fb">
      <text x="350" y="270">1</text>
      <text x="350" y="322">2</text>
      <text x="350" y="374">3</text>
      <text x="350" y="426">4</text>
      <text x="350" y="478">5</text>
      <text x="350" y="530">6</text>
      <text x="350" y="582">7</text>
      <text x="350" y="634">8</text>
      <text x="350" y="686">9</text>
    </g>
  </g>

  <!-- Full S3 board pinout -->
  <g transform="translate(760,110)">
    <rect x="0" y="0" width="650" height="760" rx="14" fill="#1f3a5f" stroke="#0d203f" stroke-width="2"/>
    <text x="325" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#e9eef7">ESP32-S3 board (full pin view)</text>
    <text x="325" y="66" text-anchor="middle" font-size="14" fill="#c8d3e8">Pin order from labeled board image, USB connectors at bottom</text>

    <text x="110" y="96" font-size="14" fill="#9fb0c9">Left rail</text>
    <text x="520" y="96" font-size="14" fill="#9fb0c9">Right rail</text>

    <!-- board body -->
    <rect x="235" y="100" width="180" height="620" rx="10" fill="#0d203f" stroke="#4a6a90"/>
    <text x="325" y="140" text-anchor="middle" font-size="14" fill="#a8b8cc">ESP32-S3 module area</text>
    <rect x="265" y="710" width="60" height="16" rx="3" fill="#bdc3c7" stroke="#7f8c8d"/>
    <rect x="335" y="710" width="60" height="16" rx="3" fill="#bdc3c7" stroke="#7f8c8d"/>

    <!-- left rail pins (22) -->
    <g font-size="14" fill="#d0d8e5" text-anchor="end">
      <text x="200" y="126">3V3</text>
      <text x="200" y="152">3V3</text>
      <text x="200" y="178">RST</text>
      <text x="200" y="204">GPIO4</text>
      <text x="200" y="230">GPIO5</text>
      <text x="200" y="256">GPIO6</text>
      <text x="200" y="282">GPIO7</text>
      <text x="200" y="308">GPIO15</text>
      <text x="200" y="334">GPIO16</text>
      <text x="200" y="360">GPIO17</text>
      <text x="200" y="386">GPIO18</text>
      <text x="200" y="412">GPIO8</text>
      <text x="200" y="438">GPIO3</text>
      <text x="200" y="464">GPIO46</text>
      <text x="200" y="490">GPIO9</text>
      <text x="200" y="516">GPIO10</text>
      <text x="200" y="542">GPIO11</text>
      <text x="200" y="568">GPIO12</text>
      <text x="200" y="594">GPIO13</text>
      <text x="200" y="620">GPIO14</text>
      <text x="200" y="646">5Vin</text>
      <text x="200" y="672">GND</text>
    </g>

    <!-- right rail pins (22) -->
    <g font-size="14" fill="#d0d8e5">
      <text x="450" y="126">GND</text>
      <text x="450" y="152">GPIO43</text>
      <text x="450" y="178">GPIO44</text>
      <text x="450" y="204">GPIO1</text>
      <text x="450" y="230">GPIO2</text>
      <text x="450" y="256">GPIO42</text>
      <text x="450" y="282">GPIO41</text>
      <text x="450" y="308">GPIO40</text>
      <text x="450" y="334">GPIO39</text>
      <text x="450" y="360">GPIO38</text>
      <text x="450" y="386">GPIO37</text>
      <text x="450" y="412">GPIO36</text>
      <text x="450" y="438">GPIO35</text>
      <text x="450" y="464">GPIO0</text>
      <text x="450" y="490">GPIO45</text>
      <text x="450" y="516">GPIO48</text>
      <text x="450" y="542">GPIO47</text>
      <text x="450" y="568">GPIO21</text>
      <text x="450" y="594">GPIO20</text>
      <text x="450" y="620">GPIO19</text>
      <text x="450" y="646">GND</text>
      <text x="450" y="672">GND</text>
    </g>

    <!-- pin anchor dots (only routed endpoints highlighted in color) -->
    <g>
      <circle cx="215" y="122" r="6" fill="#d62828"/>
      <circle cx="215" y="434" r="6" fill="#8e44ad"/>
      <circle cx="215" y="200" r="6" fill="#27ae60"/>
      <circle cx="215" y="226" r="6" fill="#e67e22"/>
      <circle cx="215" y="252" r="6" fill="#e0c50a"/>
      <circle cx="215" y="278" r="6" fill="#1e6fd9"/>
      <circle cx="435" y="122" r="6" fill="#111111"/>
      <circle cx="435" y="200" r="6" fill="#8b4513"/>
      <circle cx="435" y="226" r="6" fill="#ffffff" stroke="#333"/>
    </g>

    <g font-size="12" font-weight="700" fill="#111">
      <text x="224" y="126">9</text>
      <text x="224" y="204">4</text>
      <text x="224" y="230">5</text>
      <text x="224" y="256">6</text>
      <text x="224" y="282">7</text>
      <text x="444" y="126">8</text>
      <text x="444" y="204">1</text>
      <text x="444" y="230">2</text>
      <text x="984" y="548">3</text>
    </g>

    <g font-size="15" font-weight="700" fill="#ffe08a">
      <text x="128" y="126">3V3 (used #9)</text>
      <text x="128" y="438">GPIO3 (used #3)</text>
      <text x="128" y="204">GPIO4 (used #4)</text>
      <text x="128" y="230">GPIO5 (used #5)</text>
      <text x="128" y="256">GPIO6 (used #6)</text>
      <text x="128" y="282">GPIO7 (used #7)</text>
      <text x="465" y="126">GND (used #8)</text>
      <text x="465" y="204">GPIO1 (used #1)</text>
      <text x="465" y="230">GPIO2 (used #2)</text>
    </g>
  </g>

  <!-- routed cables -->
  <g fill="none" stroke-linecap="round" stroke-width="7">
    <path d="M420 266 C 560 266, 700 266, 1195 310" stroke="#8b4513"/>
    <path d="M420 318 C 560 318, 700 318, 1195 336" stroke="#333" stroke-width="9"/>
    <path d="M420 318 C 560 318, 700 318, 1195 336" stroke="#ffffff"/>
    <path d="M420 370 C 560 370, 700 370, 975 544" stroke="#8e44ad"/>
    <path d="M420 422 C 560 422, 700 422, 975 310" stroke="#27ae60"/>
    <path d="M420 474 C 560 474, 700 474, 975 336" stroke="#e67e22"/>
    <path d="M420 526 C 560 526, 700 526, 975 362" stroke="#e0c50a"/>
    <path d="M420 578 C 560 578, 700 578, 975 388" stroke="#1e6fd9"/>
    <path d="M420 630 C 560 630, 700 630, 1195 232" stroke="#111111"/>
    <path d="M420 682 C 560 682, 700 682, 975 232" stroke="#d62828"/>
  </g>

  <g font-size="14" font-weight="700" text-anchor="middle">
    <text x="650" y="256" fill="#8b4513">Brown</text>
    <text x="650" y="308" fill="#666">White</text>
    <text x="650" y="360" fill="#8e44ad">Purple</text>
    <text x="650" y="412" fill="#27ae60">Green</text>
    <text x="650" y="464" fill="#e67e22">Orange</text>
    <text x="650" y="516" fill="#b39a00">Yellow</text>
    <text x="650" y="568" fill="#1e6fd9">Blue</text>
    <text x="650" y="620" fill="#111">Black</text>
    <text x="650" y="672" fill="#d62828">Red</text>
  </g>

  <g transform="translate(60,888)">
    <rect width="1380" height="72" rx="10" fill="#fff" stroke="#ddd"/>
    <text x="18" y="28" font-size="15" font-weight="700" fill="#222">Color names</text>
    <text x="18" y="52" font-size="13" fill="#444">Brown=PWR, White=BUSY, Purple=RST, Green=DC, Orange=CS, Yellow=CLK, Blue=DIN, Black=GND, Red=VCC(3V3)</text>
  </g>

  <g transform="translate(60,972)">
    <rect width="1380" height="136" rx="10" fill="#ffffff" stroke="#d7d7d7"/>
    <text x="18" y="26" font-size="16" font-weight="700" fill="#222">Quick wiring checklist (S3)</text>
    <text x="18" y="52" font-size="14" fill="#333">1 Brown PWR → GPIO1   2 White BUSY → GPIO2   3 Purple RST → GPIO3   4 Green DC → GPIO4   5 Orange CS → GPIO5</text>
    <text x="18" y="78" font-size="14" fill="#333">6 Yellow CLK → GPIO6   7 Blue DIN → GPIO7   8 Black GND → GND   9 Red VCC → 3V3</text>
    <text x="18" y="104" font-size="13" fill="#666">Tip: wire one row at a time from top-to-bottom on the Waveshare connector to avoid crossing mistakes.</text>
  </g>
</svg>
